kind = "web"
previewPath = "/"
title = "HapticOS"
version = "1.0.0"
id = "artifacts/handy-controller"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20441

[services.development]
run = "sh -c 'cd /home/runner/workspace/.github/workflows/artifacts/handy-controller && node /home/runner/workspace/node_modules/vite/bin/vite.js --config vite.config.ts --host 0.0.0.0'"

[services.production]
build = [ "pnpm", "--filter", "@workspace/handy-controller", "run", "build" ]
publicDir = ".github/workflows/artifacts/handy-controller/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20441"
BASE_PATH = "/"
