kind = "web"
previewPath = "/hc-legacy/"
title = "HapticOS (legacy)"
version = "1.0.0"
id = "artifacts/handy-controller"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/hc-legacy/" ]
localPort = 8081

[services.development]
run = "fuser -k 8081/tcp || true && pnpm --filter @workspace/handy-controller run dev"

[services.env]
PORT = "8081"
BASE_PATH = "/"
