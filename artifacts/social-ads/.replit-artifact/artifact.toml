kind = "video"
previewPath = "/social-ads/"
title = "HapticOS Social Ads"
version = "1.0.0"
id = "artifacts/social-ads"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/social-ads/" ]
localPort = 22885

[services.development]
run = "pnpm --filter @workspace/social-ads run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/social-ads", "run", "build" ]
publicDir = "artifacts/social-ads/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22885"
BASE_PATH = "/social-ads/"
