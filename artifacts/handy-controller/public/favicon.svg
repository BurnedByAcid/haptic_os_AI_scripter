<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGrad" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#8B2FC9"/>
      <stop offset="55%" stop-color="#6A1099"/>
      <stop offset="100%" stop-color="#3D0068"/>
    </radialGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C850F0"/>
      <stop offset="100%" stop-color="#FF2D9A"/>
    </linearGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D66EFF"/>
      <stop offset="50%" stop-color="#FF61D8"/>
      <stop offset="100%" stop-color="#D66EFF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer circle background -->
  <circle cx="128" cy="128" r="124" fill="url(#bgGrad)"/>

  <!-- Circuit-board ring: outer track -->
  <circle cx="128" cy="128" r="108" stroke="url(#ringGrad)" stroke-width="2.5" fill="none" opacity="0.7"/>

  <!-- Circuit nodes around the ring -->
  <circle cx="128" cy="20"  r="4" fill="#C850F0"/>
  <circle cx="220" cy="68"  r="4" fill="#E040D0"/>
  <circle cx="236" cy="160" r="4" fill="#FF2D9A"/>
  <circle cx="168" cy="228" r="4" fill="#E040D0"/>
  <circle cx="88"  cy="228" r="4" fill="#C850F0"/>
  <circle cx="20"  cy="168" r="4" fill="#FF2D9A"/>
  <circle cx="20"  cy="88"  r="4" fill="#E040D0"/>

  <!-- Small tick lines at node points (circuit traces) -->
  <line x1="128" y1="24"  x2="128" y2="36"  stroke="#C850F0" stroke-width="2" opacity="0.8"/>
  <line x1="216" y1="72"  x2="208" y2="80"  stroke="#E040D0" stroke-width="2" opacity="0.8"/>
  <line x1="232" y1="156" x2="220" y2="156" stroke="#FF2D9A" stroke-width="2" opacity="0.8"/>
  <line x1="164" y1="224" x2="156" y2="216" stroke="#E040D0" stroke-width="2" opacity="0.8"/>
  <line x1="92"  y1="224" x2="100" y2="216" stroke="#C850F0" stroke-width="2" opacity="0.8"/>
  <line x1="24"  y1="164" x2="36"  y2="164" stroke="#FF2D9A" stroke-width="2" opacity="0.8"/>
  <line x1="24"  y1="92"  x2="36"  y2="100" stroke="#E040D0" stroke-width="2" opacity="0.8"/>

  <!-- Inner ring -->
  <circle cx="128" cy="128" r="86" stroke="#9B30E0" stroke-width="1.5" fill="none" opacity="0.4"/>

  <!-- Haptic waveform in the center -->
  <g filter="url(#glow)">
    <!-- Waveform bars: center tall, tapering out -->
    <rect x="73"  y="118" width="8" height="20" rx="4" fill="url(#waveGrad)" opacity="0.7"/>
    <rect x="87"  y="109" width="8" height="38" rx="4" fill="url(#waveGrad)" opacity="0.85"/>
    <rect x="101" y="98"  width="8" height="60" rx="4" fill="url(#waveGrad)"/>
    <rect x="115" y="88"  width="8" height="80" rx="4" fill="url(#waveGrad)"/>
    <rect x="129" y="98"  width="8" height="60" rx="4" fill="url(#waveGrad)"/>
    <rect x="143" y="109" width="8" height="38" rx="4" fill="url(#waveGrad)" opacity="0.85"/>
    <rect x="157" y="118" width="8" height="20" rx="4" fill="url(#waveGrad)" opacity="0.7"/>
  </g>

  <!-- Subtle center glow -->
  <circle cx="128" cy="128" r="52" fill="#9B30E0" opacity="0.08"/>
</svg>
