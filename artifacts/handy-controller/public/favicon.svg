<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGrad" cx="45%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#7B22C0"/>
      <stop offset="50%" stop-color="#510D8A"/>
      <stop offset="100%" stop-color="#2A0050"/>
    </radialGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C050E8"/>
      <stop offset="100%" stop-color="#8B20C0"/>
    </linearGradient>
    <filter id="waveGlow" x="-30%" y="-80%" width="160%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur1"/>
      <feGaussianBlur stdDeviation="10" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="traceGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E060FF" stop-opacity="0.7"/>
      <stop offset="35%" stop-color="#FF80FF"/>
      <stop offset="50%" stop-color="#FFFFFF"/>
      <stop offset="65%" stop-color="#FF80FF"/>
      <stop offset="100%" stop-color="#E060FF" stop-opacity="0.7"/>
    </linearGradient>
  </defs>

  <!-- Outer circle background -->
  <circle cx="128" cy="128" r="124" fill="url(#bgGrad)"/>

  <!-- Outer ring -->
  <circle cx="128" cy="128" r="110" stroke="url(#ringGrad)" stroke-width="2" fill="none" opacity="0.6"/>

  <!-- Inner subtle ring -->
  <circle cx="128" cy="128" r="88" stroke="#8B30C8" stroke-width="1" fill="none" opacity="0.3"/>

  <!-- Circuit traces on the LEFT side -->
  <g filter="url(#traceGlow)" stroke="#C050E8" stroke-width="2.5" fill="none" opacity="0.9">
    <!-- Main horizontal backbone from waveform start going left -->
    <line x1="82" y1="128" x2="55" y2="128"/>

    <!-- Junction node at horizontal backbone -->
    <circle cx="55" cy="128" r="4" fill="#C050E8" stroke="none"/>

    <!-- Top branch: go up from junction, then left -->
    <polyline points="55,128 55,98 34,98"/>
    <!-- Top-branch end node -->
    <circle cx="34" cy="98" r="5" fill="none" stroke="#C050E8" stroke-width="2.5"/>
    <circle cx="34" cy="98" r="2" fill="#D870FF" stroke="none"/>

    <!-- Upper-mid sub-branch off the top branch -->
    <polyline points="55,113 42,113 42,98"/>
    <circle cx="42" cy="113" r="3" fill="#C050E8" stroke="none"/>

    <!-- Bottom branch: go down from junction, then left -->
    <polyline points="55,128 55,158 34,158"/>
    <!-- Bottom-branch end node -->
    <circle cx="34" cy="158" r="5" fill="none" stroke="#C050E8" stroke-width="2.5"/>
    <circle cx="34" cy="158" r="2" fill="#D870FF" stroke="none"/>

    <!-- Lower-mid sub-branch off the bottom branch -->
    <polyline points="55,143 42,143 42,158"/>
    <circle cx="42" cy="143" r="3" fill="#C050E8" stroke="none"/>
  </g>

  <!-- ECG / Heartbeat waveform -->
  <g filter="url(#waveGlow)">
    <polyline
      points="82,128 100,128 112,68 124,178 136,118 144,136 152,128 180,128"
      stroke="url(#waveGrad)"
      stroke-width="4"
      fill="none"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </g>

  <!-- Extra bright core of the spike for bloom -->
  <g opacity="0.6">
    <polyline
      points="108,90 112,68 124,178 130,128"
      stroke="#FFFFFF"
      stroke-width="2"
      fill="none"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </g>
</svg>
