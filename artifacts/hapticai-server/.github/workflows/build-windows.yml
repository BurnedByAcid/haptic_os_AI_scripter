name: Build Windows Installers

# Triggers:
#   1. Push a tag like "v01.01.12" → builds + creates a GitHub Release automatically
#   2. Actions tab → Run workflow → enter version manually
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v01.01.12)'
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360   # 6-hour cap — three CUDA builds take ~2-3 hrs total

    steps:
    # ── Checkout ────────────────────────────────────────────────────────────
    - uses: actions/checkout@v4

    # ── Resolve version string ───────────────────────────────────────────────
    - name: Set VERSION
      shell: bash
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
        else
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
        fi

    # ── Python 3.11 ─────────────────────────────────────────────────────────
    - name: Set up Node.js 24
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # ── Inno Setup 6 (64-bit — required for large CUDA installers) ───────────
    - name: Install Inno Setup 6
      run: choco install innosetup -y

    - name: Add Inno Setup to PATH
      shell: bash
      run: echo "C:/Program Files (x86)/Inno Setup 6" >> $GITHUB_PATH

    # ── Cache pip download dir (saves re-downloading on re-runs) ─────────────
    - name: Cache pip downloads
      uses: actions/cache@v4
      with:
        path: ~\AppData\Local\pip\Cache
        key: ${{ runner.os }}-pip-${{ hashFiles('*.requirements.txt') }}
        restore-keys: ${{ runner.os }}-pip-

    # ── Virtual environment ──────────────────────────────────────────────────
    - name: Create venv + install build tools
      run: |
        python -m venv build_venv
        build_venv\Scripts\python -m pip install --upgrade pip wheel "pyinstaller<7"

    # ════════════════════════════════════════════════════════════════════════
    # STANDARD — CUDA 12.8 (RTX 30xx / 40xx)
    # ════════════════════════════════════════════════════════════════════════
    - name: '[Standard] Install deps (CUDA 12.8)'
      run: |
        build_venv\Scripts\pip install -r core.requirements.txt --ignore-requires-python
        build_venv\Scripts\pip install -r cuda.requirements.txt
        build_venv\Scripts\pip install -r web.requirements.txt
        build_venv\Scripts\pip install opencv-python-headless flask-cors

    - name: '[Standard] PyInstaller'
      run: build_venv\Scripts\pyinstaller hapticai_windows.spec --clean --noconfirm

    - name: '[Standard] Inno Setup'
      shell: cmd
      run: ISCC /DVERSION=%VERSION% installer.iss

    # ════════════════════════════════════════════════════════════════════════
    # 50 SERIES — CUDA 12.9 (RTX 50xx)
    # ════════════════════════════════════════════════════════════════════════
    - name: '[50series] Upgrade to CUDA 12.9'
      run: build_venv\Scripts\pip install -r cuda.50series.requirements.txt --force-reinstall

    - name: '[50series] PyInstaller'
      run: build_venv\Scripts\pyinstaller hapticai_windows_50series.spec --clean --noconfirm

    - name: '[50series] Inno Setup'
      shell: cmd
      run: ISCC /DVERSION=%VERSION% /DGPU_VARIANT=50series installer.iss

    # ════════════════════════════════════════════════════════════════════════
    # CPU-ONLY (no GPU required)
    # ════════════════════════════════════════════════════════════════════════
    - name: '[CPU] Swap to CPU-only PyTorch'
      run: build_venv\Scripts\pip install -r cpu.requirements.txt --force-reinstall

    - name: '[CPU] PyInstaller'
      run: build_venv\Scripts\pyinstaller hapticai_windows_cpu.spec --clean --noconfirm

    - name: '[CPU] Inno Setup'
      shell: cmd
      run: ISCC /DVERSION=%VERSION% /DGPU_VARIANT=cpu installer.iss

    # ── Upload installers as job artifacts (available for any trigger) ───────
    - name: Upload installers
      uses: actions/upload-artifact@v4
      with:
        name: installers-${{ env.VERSION }}
        path: dist\HapticAI-Setup*.exe
        retention-days: 14

    # ── Create GitHub Release (only on tag push) ─────────────────────────────
    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        name: ${{ env.VERSION }}
        generate_release_notes: true
        files: |
          dist/HapticAI-Setup.exe
          dist/HapticAI-Setup-50series.exe
          dist/HapticAI-Setup-CPU.exe
